name: Simple Build Test Deploy Pipeline

on: push

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Build step
        run: |
          echo "Starting build..."
          python --version
          echo "Build completed successfully."

  lint:
     runs-on: ubuntu-latest
     needs: build

     steps:
        - name: Checkout repository code
          uses: actions/checkout@v4

        - name: syntax check
          run: python -m py_compile app.py

        - name: Lint Completed
          run: echo "Lint check completed"
        

  test:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install pytest
        run: pip install pytest

      - name: Run tests
        run: pytest

  deploy:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Deploy step
        run: |
          echo "Starting deployment..."
          echo "Application deployed successfully!"
          echo "This is a simulated deployment."

